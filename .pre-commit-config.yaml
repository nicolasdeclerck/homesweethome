# Pre-commit local — installer avec `pre-commit install` à la racine du repo.
# Voir https://pre-commit.com/.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: django-makemigrations-check
        name: Django makemigrations --check
        # Vérifie qu'aucune modification de modèle n'a été oubliée (migration
        # non générée). Tourne dans le conteneur web pour disposer de la stack
        # complète (Postgres, settings).
        entry: docker compose exec -T web python manage.py makemigrations --check --dry-run
        language: system
        pass_filenames: false
        files: '\.py$'
        stages: [pre-commit]
