name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.test

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Run ruff
        run: ruff check .

  test:
    name: Tests (pytest + coverage 80%)
    runs-on: ubuntu-latest
    needs: lint
    env:
      DJANGO_SECRET_KEY: ci-secret-not-for-prod
      POSTGRES_DB: homesweethome
      POSTGRES_USER: homesweethome
      POSTGRES_PASSWORD: homesweethome
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: homesweethome
          POSTGRES_USER: homesweethome
          POSTGRES_PASSWORD: homesweethome
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homesweethome"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run pytest with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
